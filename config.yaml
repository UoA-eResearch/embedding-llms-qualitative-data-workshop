# Which carpentry is this (swc, dc, lc, or cp)?
# swc: Software Carpentry
# dc: Data Carpentry
# lc: Library Carpentry
# cp: Carpentries (to use for instructor training for instance)
# incubator: The Carpentries Incubator
# 
# This option supports custom types so lessons can be branded
# and themed with your own logo and alt-text (see `carpentry_description`)
# See https://carpentries.github.io/sandpaper-docs/editing.html#adding-a-custom-logo
carpentry: 'incubator'

# Alt-text description of the lesson.
carpentry_description: >
  Qualitative research often involves analysing large amounts of information, which can be
  very time-consuming. Building on concepts from the Introduction to AI-assisted workflows
  for qualitative analyses workshop, participants will build an AI-assisted workflow leveraging
  Large Language Models (LLMs) to extract features and identify themes in text and image
  collections — enabling you to scale up analyses and derive insights from large datasets.
  Learning outcomes include: building an LLM-assisted research workflow; practising effective
  prompting to prepare, label, and analyse unstructured text and images; identifying and
  mitigating key ethical risks such as biases and hallucinations; and critically evaluating
  the outputs of LLM-assisted analysis methods.

# Overall title for pages.
title: 'Embedding Large Language Models (LLMs) into qualitative research workflows workshop'

